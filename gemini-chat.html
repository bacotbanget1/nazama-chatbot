<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini AI Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --border: #2a2a3d;
    --accent: #7c6dfa;
    --accent2: #fa6d9a;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --user-bubble: #1e1a3a;
    --ai-bubble: #131320;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(124,109,250,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 80% 80%, rgba(250,109,154,0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  .header {
    position: relative;
    z-index: 10;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,15,0.8);
    backdrop-filter: blur(20px);
  }

  .header-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .header-title {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .header-sub {
    font-size: 11px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    margin-top: 1px;
  }

  .status-dot {
    width: 7px; height: 7px;
    background: #4ade80;
    border-radius: 50%;
    margin-left: auto;
    box-shadow: 0 0 8px #4ade80;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Chat area */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    position: relative;
    z-index: 1;
  }

  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* Welcome */
  .welcome {
    text-align: center;
    padding: 40px 20px;
    animation: fadeUp 0.6s ease;
  }

  .welcome-emoji {
    font-size: 48px;
    margin-bottom: 16px;
    display: block;
  }

  .welcome h2 {
    font-size: 22px;
    font-weight: 800;
    margin-bottom: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .welcome p {
    color: var(--muted);
    font-size: 14px;
    font-family: 'DM Mono', monospace;
  }

  /* Messages */
  .message {
    display: flex;
    gap: 10px;
    animation: fadeUp 0.3s ease;
    max-width: 100%;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px; height: 32px;
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .avatar.user-av {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
  }

  .avatar.ai-av {
    background: var(--surface2);
    border: 1px solid var(--border);
  }

  .bubble {
    max-width: calc(100% - 80px);
    padding: 12px 15px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.65;
    position: relative;
  }

  .bubble.user {
    background: var(--user-bubble);
    border: 1px solid rgba(124,109,250,0.3);
    border-top-right-radius: 4px;
    color: var(--text);
  }

  .bubble.ai {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
  }

  /* Typing indicator */
  .typing {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 14px 15px;
  }

  .typing span {
    width: 7px; height: 7px;
    background: var(--muted);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); background: var(--accent); }
  }

  /* Input area */
  .input-area {
    position: relative;
    z-index: 10;
    padding: 12px 16px 16px;
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 10px 10px 10px 16px;
    transition: border-color 0.2s;
  }

  .input-row:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,109,250,0.1);
  }

  textarea {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    resize: none;
    max-height: 120px;
    min-height: 22px;
    line-height: 1.5;
  }

  textarea::placeholder { color: var(--muted); }

  .send-btn {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 10px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s, opacity 0.15s;
  }

  .send-btn:hover { transform: scale(1.05); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .send-btn svg { width: 16px; height: 16px; fill: white; }

  .hint {
    text-align: center;
    font-size: 10px;
    color: var(--muted);
    margin-top: 8px;
    font-family: 'DM Mono', monospace;
  }

  /* Error */
  .error-msg {
    background: rgba(250,109,109,0.1);
    border: 1px solid rgba(250,109,109,0.3);
    color: #fa9090;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">✦</div>
  <div>
    <div class="header-title">Gemini AI</div>
    <div class="header-sub">gemini-2.0-flash-lite · free tier</div>
  </div>
  <div class="status-dot"></div>
</div>

<div class="chat-area" id="chatArea">
  <div class="welcome" id="welcome">
    <span class="welcome-emoji">⚡</span>
    <h2>Tanya Apa Saja</h2>
    <p>powered by Google Gemini API</p>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="msgInput" placeholder="Ketik pesan..." rows="1"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>
  <div class="hint">Tekan Enter untuk kirim · Shift+Enter untuk baris baru</div>
</div>

<script>
const API_KEY = "AIzaSyDohpxL2GUAejOv1aJrmjzI93-IKdaVleU";
const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-lite:generateContent?key=${API_KEY}`;

const chatArea = document.getElementById('chatArea');
const msgInput = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');
const welcome = document.getElementById('welcome');

let isLoading = false;

// Auto resize textarea
msgInput.addEventListener('input', () => {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
});

// Enter to send
msgInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

function addMessage(text, isUser) {
  if (welcome) welcome.style.display = 'none';
  
  const msg = document.createElement('div');
  msg.className = `message ${isUser ? 'user' : 'ai'}`;
  
  const avatar = document.createElement('div');
  avatar.className = `avatar ${isUser ? 'user-av' : 'ai-av'}`;
  avatar.textContent = isUser ? '👤' : '✦';
  
  const bubble = document.createElement('div');
  bubble.className = `bubble ${isUser ? 'user' : 'ai'}`;
  bubble.textContent = text;
  
  msg.appendChild(avatar);
  msg.appendChild(bubble);
  chatArea.appendChild(msg);
  chatArea.scrollTop = chatArea.scrollHeight;
  return bubble;
}

function showTyping() {
  const msg = document.createElement('div');
  msg.className = 'message ai';
  msg.id = 'typing';
  
  const avatar = document.createElement('div');
  avatar.className = 'avatar ai-av';
  avatar.textContent = '✦';
  
  const bubble = document.createElement('div');
  bubble.className = 'bubble ai';
  bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  
  msg.appendChild(avatar);
  msg.appendChild(bubble);
  chatArea.appendChild(msg);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function sendMessage() {
  const text = msgInput.value.trim();
  if (!text || isLoading) return;
  
  isLoading = true;
  sendBtn.disabled = true;
  msgInput.value = '';
  msgInput.style.height = 'auto';
  
  addMessage(text, true);
  showTyping();
  
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text }] }]
      })
    });
    
    const data = await res.json();
    removeTyping();
    
    if (data?.candidates?.[0]?.content?.parts?.[0]?.text) {
      addMessage(data.candidates[0].content.parts[0].text, false);
    } else if (data?.error?.message) {
      addMessage('⚠️ Error: ' + data.error.message, false);
    } else {
      addMessage('⚠️ Tidak ada respons dari API.', false);
    }
  } catch (err) {
    removeTyping();
    addMessage('⚠️ Gagal terhubung: ' + err.message, false);
  }
  
  isLoading = false;
  sendBtn.disabled = false;
  msgInput.focus();
}
</script>
</body>
</html>
